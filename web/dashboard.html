<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>看板 · Horizon Board</title>
  <link rel="stylesheet" href="/static/common.css" />
  <style>
    .dash-toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .dash-toolbar .title { font-size: 18px; font-weight: 600; }
    .dash-toolbar .sub { color: var(--text-3); font-size: 13px; }
    .dash-toolbar .spacer { flex: 1; }

    .summary {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding: 16px 24px 0;
    }
    .summary .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .summary .card .label { font-size: 12px; color: var(--text-3); }
    .summary .card .value { font-size: 22px; font-weight: 600; margin-top: 6px; }
    .summary .card .delta { font-size: 12px; color: var(--text-3); margin-top: 2px; }

    .grid-2x2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 16px 24px 24px;
    }
    @media (max-width: 1100px) { .grid-2x2 { grid-template-columns: 1fr; } }

    .panel-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .panel-card .head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: #fafbfc;
    }
    .panel-card .head .name { font-weight: 600; }
    .panel-card .head .name .badge {
      display: inline-block; padding: 1px 8px; border-radius: 10px;
      font-size: 12px; font-weight: 500; margin-left: 8px;
    }
    .panel-card .head .count { color: var(--text-3); font-size: 12px; }

    .top-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .top-table th, .top-table td { padding: 8px 12px; text-align: left; }
    .top-table thead th {
      color: var(--text-3); font-weight: 500; background: #fafbfc;
      border-bottom: 1px solid var(--border);
    }
    .top-table tbody tr { border-bottom: 1px solid #f5f6fa; }
    .top-table tbody tr:last-child { border-bottom: none; }
    .top-table tbody tr:hover { background: #fafbff; }
    .top-table .rank {
      width: 28px; text-align: center;
      color: var(--text-3); font-variant-numeric: tabular-nums;
    }
    .top-table .rank.top1 { color: #f04438; font-weight: 700; }
    .top-table .rank.top2 { color: #f59e0b; font-weight: 700; }
    .top-table .rank.top3 { color: #2b6dff; font-weight: 700; }
    .top-table .name-cell {
      max-width: 320px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .top-table .num {
      text-align: right; font-variant-numeric: tabular-nums;
      width: 90px;
    }
    .top-table .source { color: var(--text-3); font-size: 12px; width: 120px; }
    .top-table .empty-row td {
      padding: 32px 16px; text-align: center; color: var(--text-3);
    }

    .badge.douyin   { background: #fff0f3; color: #e02d52; }
    .badge.xhs      { background: #ffeeee; color: #ff2442; }
    .badge.bili     { background: #e6f6ff; color: #00a1d6; }
    .badge.kuaishou { background: #fff4e0; color: #ff7a00; }
  </style>
</head>
<body>
  <div id="topbar"></div>

  <div class="dash-toolbar">
    <div>
      <div class="title">昨日热点 Top10</div>
      <div class="sub" id="dateLabel">—</div>
    </div>
    <div class="spacer"></div>
    <select id="sheetFilter">
      <option value="">全部数据表</option>
    </select>
    <input type="date" id="dateInput" />
    <button id="btnRefresh">刷新</button>
  </div>

  <div class="summary" id="summary"></div>

  <div class="grid-2x2" id="board"></div>

  <script src="/static/common.js"></script>
  <script>
    document.getElementById("topbar").innerHTML = renderTopbar("dashboard");
    bindTopbar();

    const PLATFORM_META = [
      { key: "抖音",   class: "douyin" },
      { key: "小红书", class: "xhs" },
      { key: "B站",    class: "bili" },
      { key: "快手",   class: "kuaishou" },
    ];

    async function init() {
      const sheets = await api("/api/sheets");
      const sel = document.getElementById("sheetFilter");
      sheets.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s.id;
        opt.textContent = s.name;
        sel.appendChild(opt);
      });
      document.getElementById("dateInput").value = yesterdayISO();
      loadDashboard();
    }

    async function loadDashboard() {
      const date = document.getElementById("dateInput").value || yesterdayISO();
      const sheetId = document.getElementById("sheetFilter").value;
      const params = new URLSearchParams({ date });
      if (sheetId) params.append("sheet_id", sheetId);
      const data = await api(`/api/dashboard?${params}`);

      document.getElementById("dateLabel").textContent =
        `数据日期：${data.date}　·　共 ${data.summary.total_rows} 条`;

      // summary 卡片
      const summary = document.getElementById("summary");
      const counts = data.summary.by_platform_count;
      summary.innerHTML = [
        { label: "当日总条数", value: data.summary.total_rows },
        ...PLATFORM_META.map(p => ({ label: p.key, value: counts[p.key] || 0 })),
      ].map(c => `
        <div class="card">
          <div class="label">${escapeHtml(c.label)}</div>
          <div class="value">${fmtNum(c.value)}</div>
        </div>
      `).join("");

      // 4 个 platform 表格
      const board = document.getElementById("board");
      board.innerHTML = data.platforms.map(p => {
        const meta = PLATFORM_META.find(m => m.key === p.platform) || { class: "other" };
        const rows = p.items.length === 0
          ? `<tr class="empty-row"><td colspan="4">暂无数据</td></tr>`
          : p.items.map((it, i) => {
              const rankCls = i === 0 ? "top1" : i === 1 ? "top2" : i === 2 ? "top3" : "";
              const url = it.URL ? `<a href="${escapeHtml(it.URL)}" target="_blank" rel="noopener">${escapeHtml(it["热点名称"] || "(无标题)")}</a>` : escapeHtml(it["热点名称"] || "(无标题)");
              return `
                <tr>
                  <td class="rank ${rankCls}">${i + 1}</td>
                  <td class="name-cell" title="${escapeHtml(it['热点名称'])}">${url}<div class="source">${escapeHtml(it.sheet_name)}</div></td>
                  <td class="num">${fmtNum(it["点赞"])}</td>
                  <td class="num">${fmtNum(it["相关视频数量"])}</td>
                </tr>
              `;
            }).join("");
        return `
          <div class="panel-card">
            <div class="head">
              <div class="name">
                ${escapeHtml(p.platform)}
                <span class="badge ${meta.class}">Top10</span>
              </div>
              <div class="count">当日共 ${p.total} 条</div>
            </div>
            <table class="top-table">
              <thead>
                <tr>
                  <th class="rank">#</th>
                  <th>热点名称</th>
                  <th class="num">点赞</th>
                  <th class="num">视频数</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      }).join("");
    }

    document.getElementById("btnRefresh").onclick = loadDashboard;
    document.getElementById("dateInput").onchange = loadDashboard;
    document.getElementById("sheetFilter").onchange = loadDashboard;

    init();
  </script>
</body>
</html>
